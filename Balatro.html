<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balatro</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; font-family: 'Orbitron', Arial, sans-serif; }
  .back-btn {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 1000;
    padding: 8px 18px;
    background: rgba(0, 0, 0, 0.7);
    color: #ff1a1a;
    border: 2px solid #ff1a1a;
    font-size: 14px;
    font-weight: 700;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
    transition: background 0.2s, box-shadow 0.2s;
  }
  .back-btn:hover {
    background: rgba(255, 26, 26, 0.2);
    box-shadow: 0 0 15px rgba(255, 26, 26, 0.4);
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #fff;
    text-align: center;
    gap: 24px;
    padding: 24px;
  }
  .container h1 { font-size: 2.5rem; color: #ff1a1a; }
  .container p { font-size: 1.1rem; color: #888; max-width: 500px; line-height: 1.6; }
  .actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
  .play-link {
    display: inline-block;
    padding: 16px 40px;
    text-decoration: none;
    font-size: 1.2rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
    transition: background 0.2s, box-shadow 0.2s;
    background: #ff1a1a;
    color: #fff;
  }
  .play-link:hover {
    background: #ff4d4d;
    box-shadow: 0 0 25px rgba(255, 26, 26, 0.5);
  }
</style>
</head>
<body>
<a class="back-btn" href="index.html">&larr; Back</a>
<div class="container">
  <h1>Balatro</h1>
  <p>Roguelike deck-builder. Play your cards right.</p>
  <div class="actions">
    <a class="play-link" href="balatro.zip" download>Download Offline Version</a>
  </div>
</div>
</body>
</html>
